# Пиннинг toolchain для ВОСПРОИЗВОДИМОЙ сборки WASM-прувера.
#
# Reproducible-hash: любой, кто соберёт прувер этим toolchain из этого
# исходника, получит байт-в-байт тот же .wasm — и сверит его sha256 с тем,
# что грузится в браузере на tidex6.com/verify. Так доказывается, что в
# браузере крутится именно открытый аудируемый код, а не тайный бэкдор.
#
# Версия зафиксирована; менять только вместе с публикацией нового хеша.
[toolchain]
channel = "1.95.0"
targets = ["wasm32-unknown-unknown"]
components = ["rust-std", "rustc", "cargo"]
